name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          tmp_dir="$(mktemp -d)"
          askpass_script="$(mktemp)"
          trap 'rm -rf "$tmp_dir" "$askpass_script"' EXIT

          rsync -a \
            --exclude '.git' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude 'temp/' \
            ./ "$tmp_dir/"

          cd "$tmp_dir"
          git init
          git checkout -b main
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Sync from GitHub Actions"

          cat > "$askpass_script" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            *Username*) echo "RyderM-WX" ;;
            *Password*) echo "$HF_TOKEN" ;;
          esac
          EOF
          chmod 700 "$askpass_script"

          GIT_ASKPASS="$askpass_script" GIT_TERMINAL_PROMPT=0 \
            git push --force https://huggingface.co/spaces/RyderM-WX/Radar-api main
