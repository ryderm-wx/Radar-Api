name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          tmp_dir="$(mktemp -d)"
          rsync -a --delete \
            --exclude '.git' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude 'temp/' \
            ./ "$tmp_dir/"

          cd "$tmp_dir"
          git init
          git checkout -b main
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Sync from GitHub Actions"
          hf_repo_url="https://RyderM-WX:${HF_TOKEN}@huggingface.co/spaces/RyderM-WX/Radar-api"
          git push --force "$hf_repo_url" main
